name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Windows validation (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Sync development dependencies
        run: uv sync --extra dev --locked

      - name: Run test suite
        run: uv run --extra dev pytest

      - name: Run compile check
        run: uv run --extra dev python -m compileall src tests

      - name: Build wheel and sdist
        run: uv build
