name: Release Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-exe:
    name: Build unsigned Windows EXE
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Build EXE with PyInstaller
        shell: cmd
        run: build_exe_windows.bat

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LIMUZIN_GRID_MANAGER-windows-exe
          path: dist/LIMUZIN_GRID_MANAGER.exe
          if-no-files-found: error
          retention-days: 14
